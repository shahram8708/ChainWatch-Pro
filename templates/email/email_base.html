<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject or 'ChainWatch Pro Notification' }}</title>
</head>
<body style="margin:0;padding:0;background-color:#F5F7FA;font-family:Inter,Arial,sans-serif;color:#1A1A2E;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F5F7FA;padding:24px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e6ecf5;">
                    <tr>
                        <td style="background:#1B3A6B;padding:20px 24px;color:#ffffff;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="font-size:22px;font-weight:700;line-height:1.2;">ChainWatch Pro</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px 24px;line-height:1.6;font-size:14px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 24px;background:#f8fbff;border-top:1px solid #e7eef8;color:#555577;font-size:12px;line-height:1.5;">
                            <div>ChainWatch Pro | Smart Supply Chain Intelligence</div>
                            <div style="margin-top:6px;">This email was sent to {{ user.email }}.</div>
                            <div style="margin-top:6px;">If this was not intended for you, you can ignore this message.</div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
