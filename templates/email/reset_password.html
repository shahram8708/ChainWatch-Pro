{% extends "email/email_base.html" %}

{% block content %}
<p style="margin:0 0 14px;">Hi {{ user.first_name }},</p>
<p style="margin:0 0 18px;">You requested a password reset for your ChainWatch Pro account.</p>
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 18px;">
    <tr>
        <td>
            <a href="{{ reset_url }}" style="display:inline-block;background:#0077CC;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:600;">Reset My Password</a>
        </td>
    </tr>
</table>
<p style="margin:0 0 10px;color:#555577;">This link expires in 1 hour.</p>
<p style="margin:0;color:#555577;">If you didn't request this, ignore this email. Your password will not change.</p>
{% endblock %}
