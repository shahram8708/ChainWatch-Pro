{% extends "base.html" %}

{% block title %}403 Forbidden | ChainWatch Pro{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-card">
        <h1>403</h1>
        <h2>Access denied</h2>
        <p>You do not have permission to access this page.</p>
        <div class="d-flex flex-wrap justify-content-center gap-2">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">Back to Dashboard</a>
            {% endif %}
            <a href="{{ url_for('public.home') }}" class="btn btn-outline-secondary">Go to Home</a>
            <a href="{{ url_for('public.contact') }}" class="btn btn-outline-primary">Contact Support</a>
        </div>
    </div>
</div>
{% endblock %}
