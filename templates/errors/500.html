{% extends "base.html" %}

{% block title %}500 Server Error | ChainWatch Pro{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-card">
        <h1>500</h1>
        <h2>Something went wrong</h2>
        <p>We encountered an internal error. Please try again in a moment.</p>
        <div class="d-flex flex-wrap justify-content-center gap-2">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">Back to Dashboard</a>
            {% endif %}
            <a href="{{ url_for('public.home') }}" class="btn btn-outline-secondary">Go to Home</a>
        </div>
    </div>
</div>
{% endblock %}
